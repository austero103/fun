<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Love Bear Quiz 💕</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <!-- Bear with heart -->
        <div class="bear-container">
            <div class="bear">
                <div class="bear-head">
                    <div class="bear-ears">
                        <div class="ear left"></div>
                        <div class="ear right"></div>
                    </div>
                    <div class="bear-face">
                        <div class="eyes">
                            <div class="eye left"></div>
                            <div class="eye right"></div>
                        </div>
                        <div class="nose"></div>
                        <div class="smile"></div>
                    </div>
                </div>
                <div class="bear-body">
                    <div class="heart-container">
                        <div class="heart">💖</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Questions -->
        <div class="question-container" id="questionContainer">
            <div class="question" id="question">Do you love me? 💕</div>
            <div class="answers" id="answers">
                <button class="answer-btn yes-btn" id="yesBtn">YES 😍</button>
                <button class="answer-btn no-btn" id="noBtn">NO 😢</button>
            </div>
        </div>

        <!-- Celebration -->
        <div class="celebration" id="celebration">
            <div class="yey-text">YEEYYYYY! 🎉💕</div>
            <div class="cats-container" id="catsContainer"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
